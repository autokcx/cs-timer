<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>CyberPunk 闹钟</title>
  <style>
    @font-face {
      font-family: 'Rajdhani';
      src: url('fonts/Rajdhani-Medium.ttf') format('truetype');
      font-weight: 500;
    }
    @font-face {
      font-family: 'Rajdhani';
      src: url('fonts/Rajdhani-Bold.ttf') format('truetype');
      font-weight: 700;
    }

    :root {
      --yellow: #fcee0a;   /* 赛博朋克标志黄 */
      --cyan: #00f0ff;
      --red: #ff003c;
      --accent: var(--cyan);
      --bg: #05060a;
    }
    body.break { --accent: var(--yellow); }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Rajdhani', 'PingFang SC', sans-serif;
      color: #d7fbff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag;
      position: relative;
      background:
        repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,0.28) 2px 3px),
        radial-gradient(circle at 50% 10%, rgba(0,240,255,0.10), transparent 55%),
        radial-gradient(circle at 50% 115%, rgba(252,238,10,0.08), transparent 55%),
        var(--bg);
    }
    /* 边缘霓虹描边 */
    body::after {
      content: "";
      position: fixed; inset: 6px;
      border: 1px solid rgba(0,240,255,0.18);
      clip-path: polygon(0 14px, 14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%);
      pointer-events: none;
    }

    /* 顶部状态条 */
    .topbar {
      position: absolute; top: 15px; left: 86px; right: 20px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; letter-spacing: 2px; color: var(--cyan);
      text-transform: uppercase; opacity: 0.8; z-index: 3;
    }
    .topbar .dot { color: var(--red); animation: blink 1.4s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0.2; } }

    .modes { display: flex; gap: 0; margin-bottom: 22px; -webkit-app-region: no-drag; z-index: 2; }
    .mode-btn {
      padding: 8px 15px;
      border: 1px solid rgba(0,240,255,0.25);
      background: rgba(0,240,255,0.04);
      color: #6f9aa6;
      font-family: inherit; font-weight: 700; font-size: 13px;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s;
      clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
    }
    .mode-btn + .mode-btn { border-left: none; }
    .mode-btn:hover { color: #d7fbff; }
    .mode-btn.active {
      color: var(--bg);
      background: var(--accent);
      text-shadow: none;
      box-shadow: 0 0 16px var(--accent);
    }

    .ring-wrap { position: relative; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center; }
    svg.ring { position: absolute; inset: 0; transform: rotate(-90deg); }
    .track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 3; }
    .progress {
      fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: butt;
      filter: drop-shadow(0 0 7px var(--accent));
      transition: stroke-dashoffset 0.4s linear, stroke 0.3s;
    }
    /* 刻度装饰 */
    .ticks { position: absolute; inset: 0; }
    .pulse {
      position: absolute; width: 210px; height: 210px; border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent) 14%, transparent), transparent 68%);
      animation: breathe 3.6s ease-in-out infinite;
    }
    body.running .pulse { animation-duration: 1.6s; }
    @keyframes breathe { 0%,100% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.06); opacity: 0.95; } }

    .center { position: relative; text-align: center; z-index: 2; }
    .time {
      font-weight: 700; font-size: 66px; line-height: 1; letter-spacing: 2px;
      font-variant-numeric: tabular-nums; color: #fff;
      text-shadow: 0 0 20px var(--accent);
      position: relative;
    }
    /* 故障 RGB 错位 */
    body.running .time::before, body.running .time::after {
      content: attr(data-t); position: absolute; left: 0; top: 0; width: 100%;
      opacity: 0.55; mix-blend-mode: screen;
    }
    body.running .time::before { color: var(--red); animation: glitchA 2.6s infinite steps(2); }
    body.running .time::after { color: var(--cyan); animation: glitchB 2.6s infinite steps(2); }
    @keyframes glitchA { 0%,92%,100% { transform: translate(0,0); opacity:0 } 94% { transform: translate(-2px,1px); opacity:0.6 } 96% { transform: translate(2px,-1px) } }
    @keyframes glitchB { 0%,92%,100% { transform: translate(0,0); opacity:0 } 94% { transform: translate(2px,-1px); opacity:0.6 } 96% { transform: translate(-2px,1px) } }

    .label { margin-top: 6px; font-size: 14px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; color: var(--accent); }

    .controls { display: flex; gap: 12px; align-items: stretch; margin-top: 28px; -webkit-app-region: no-drag; z-index: 2; }
    .primary {
      min-width: 150px; padding: 14px 0;
      border: 1px solid var(--accent); background: var(--accent); color: var(--bg);
      font-family: inherit; font-weight: 700; font-size: 16px; letter-spacing: 4px;
      text-transform: uppercase; cursor: pointer;
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 45%, transparent);
      clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
      transition: transform 0.1s, box-shadow 0.2s, filter 0.2s;
    }
    .primary:hover { filter: brightness(1.12); box-shadow: 0 0 30px var(--accent); }
    .primary:active { transform: scale(0.96); }

    .icon-btn {
      width: 50px;
      border: 1px solid rgba(0,240,255,0.3); background: rgba(0,240,255,0.05);
      color: var(--accent); font-size: 20px; cursor: pointer; transition: all 0.2s;
      clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
    }
    .icon-btn:hover { background: var(--accent); color: var(--bg); box-shadow: 0 0 16px var(--accent); }

    .count { margin-top: 22px; font-size: 13px; font-weight: 700; letter-spacing: 3px; color: #5f8791; text-transform: uppercase; z-index: 2; }
    .count b { color: var(--yellow); font-size: 16px; }

    /* 签名——赛博黄大字，醒目 */
    .signature {
      position: absolute; bottom: 16px; z-index: 3;
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--yellow);
      background: rgba(252,238,10,0.08);
      padding: 4px 14px;
      border: 1px solid rgba(252,238,10,0.4);
      text-shadow: 0 0 10px rgba(252,238,10,0.7);
      box-shadow: 0 0 14px rgba(252,238,10,0.15);
      clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span><span class="dot">●</span> REC · 系统在线</span>
    <span id="clock">CYBER//OS</span>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="work">专注</button>
    <button class="mode-btn" data-mode="short">小憩</button>
    <button class="mode-btn" data-mode="long">长休</button>
  </div>

  <div class="ring-wrap">
    <div class="pulse"></div>
    <svg class="ring" viewBox="0 0 250 250">
      <circle class="track" cx="125" cy="125" r="116"></circle>
      <circle class="progress" id="progress" cx="125" cy="125" r="116"></circle>
    </svg>
    <div class="center">
      <div class="time" id="time" data-t="25:00">25:00</div>
      <div class="label" id="label">专注模式</div>
    </div>
  </div>

  <div class="controls">
    <button class="primary" id="startBtn">启动</button>
    <button class="icon-btn" id="resetBtn" title="重置">↺</button>
  </div>

  <div class="count" id="count">已完成番茄 · <b>0</b></div>

  <div class="signature">Kevin's 1st Vibe Coding App</div>

  <script>
    /* ---------- 计时逻辑 ---------- */
    const DURATIONS = { work: 25 * 60, short: 5 * 60, long: 15 * 60 };
    const LABELS = { work: '专注模式', short: '小憩模式', long: '长休模式' };

    let mode = 'work';
    let remaining = DURATIONS[mode];
    let timerId = null;
    let running = false;
    let completed = 0;

    const timeEl = document.getElementById('time');
    const labelEl = document.getElementById('label');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const countEl = document.getElementById('count');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const progressEl = document.getElementById('progress');

    const R = 116;
    const CIRC = 2 * Math.PI * R;
    progressEl.style.strokeDasharray = CIRC;

    const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

    function render() {
      const t = fmt(remaining);
      timeEl.textContent = t;
      timeEl.dataset.t = t;
      labelEl.textContent = LABELS[mode];
      startBtn.textContent = running ? '暂停' : '启动';
      document.title = `${t} · ${LABELS[mode]}`;
      document.body.classList.toggle('break', mode !== 'work');
      document.body.classList.toggle('running', running);
      modeBtns.forEach((b) => b.classList.toggle('active', b.dataset.mode === mode));
      progressEl.style.strokeDashoffset = CIRC * (1 - remaining / DURATIONS[mode]);
    }

    function tick() {
      remaining--;
      if (remaining <= 0) { finish(); return; }
      render();
    }
    function start() {
      if (running) return;
      running = true;
      timerId = setInterval(tick, 1000);
      cue('start'); render();
    }
    function pause() {
      const was = running;
      running = false;
      clearInterval(timerId); timerId = null;
      if (was) cue('pause');
      render();
    }
    function toggle() { running ? pause() : start(); }
    function reset() { const w = running; pause(); remaining = DURATIONS[mode]; if (!w) cue('reset'); render(); }
    function switchMode(next, silent) { mode = next; running = false; clearInterval(timerId); timerId = null; remaining = DURATIONS[mode]; if (!silent) blip(660, 0.05); render(); }

    function finish() {
      pause();
      remaining = 0; render();
      let title, body, next;
      if (mode === 'work') {
        completed++;
        countEl.innerHTML = `已完成番茄 · <b>${completed}</b>`;
        next = completed % 4 === 0 ? 'long' : 'short';
        title = '专注结束 🍅';
        body = next === 'long' ? '干得漂亮，休息 15 分钟吧。' : '休息 5 分钟，放松一下。';
        cue('workDone');
      } else {
        next = 'work';
        title = '休息结束 ☕';
        body = '回到专注，开始下一个番茄。';
        cue('breakDone');
      }
      if (window.pomodoro) window.pomodoro.notify(title, body);
      alarm();
      switchMode(next, true);
    }

    /* ---------- 声音引擎 ---------- */
    // 每个动作配一句经典 CS:GO 台词（保留英文原味）
    const LINES = {
      start:     ["Rush B! Rush B!", "Let's go, let's go!", "Go go go!"],
      pause:     ["Hold this position.", "Take cover!", "Hold your fire."],
      reset:     ["Regroup, team.", "Fall back!", "Reset the round."],
      workDone:  ["The bomb has been planted.", "Target eliminated.", "Nice shot, buddy!"],
      breakDone: ["Get in position, we are moving out.", "Move out!", "Lock and load."],
    };

    let actx = null;
    function ac() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx; }

    // 合成赛博电子 blip
    function blip(freq, dur, type='square') {
      try {
        const c = ac(); const t = c.currentTime;
        const o = c.createOscillator(), g = c.createGain();
        o.type = type; o.frequency.setValueAtTime(freq, t);
        o.frequency.exponentialRampToValueAtTime(freq * 0.6, t + dur);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.25, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g).connect(c.destination); o.start(t); o.stop(t + dur + 0.02);
      } catch (e) {}
    }
    // 到点警报（连续三声上扬）
    function alarm() { [880, 1100, 1320].forEach((f, i) => setTimeout(() => blip(f, 0.18, 'sawtooth'), i * 190)); }

    // 语音念台词（英文）
    function speak(text) {
      try {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; u.rate = 1.05; u.pitch = 0.9; u.volume = 1;
        const v = speechSynthesis.getVoices().find(x => /en(-|_)?US/i.test(x.lang));
        if (v) u.voice = v;
        speechSynthesis.cancel(); speechSynthesis.speak(u);
      } catch (e) {}
    }

    // 动作触发：优先播放 sounds/<action>.mp3（用户放真实 CS:GO 音频），否则合成音效 + 语音
    function cue(action) {
      blip(action === 'workDone' || action === 'breakDone' ? 520 : 720, 0.06);
      const line = LINES[action] ? LINES[action][Math.floor(Math.random() * LINES[action].length)] : '';
      const audio = new Audio(`sounds/${action}.mp3`);
      audio.volume = 1;
      audio.play().catch(() => { if (line) speak(line); }); // 无真实音频则用语音念台词
    }

    /* ---------- 事件绑定 ---------- */
    startBtn.addEventListener('click', toggle);
    resetBtn.addEventListener('click', reset);
    modeBtns.forEach((b) => b.addEventListener('click', () => switchMode(b.dataset.mode)));
    document.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); toggle(); } });
    // 预热语音列表
    if ('speechSynthesis' in window) speechSynthesis.getVoices();

    render();
  </script>
</body>
</html>
