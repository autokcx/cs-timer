<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>CS Timer</title>
  <style>
    @font-face { font-family: 'Rajdhani'; src: url('fonts/Rajdhani-Medium.ttf') format('truetype'); font-weight: 500; }
    @font-face { font-family: 'Rajdhani'; src: url('fonts/Rajdhani-Bold.ttf') format('truetype'); font-weight: 700; }

    :root {
      --t:    #d8a441;    /* T 金 = 专注 */
      --rest: #4fb0a5;    /* 休息青 */
      --red:  #e5401f;    /* C4 红 */
      --money:#a6d65a;    /* 计分绿 */
      --bg:   #0f1215;
      --panel:#171b1f;
      --line: #2c333a;
      --ink:  #cdd4da;
      --mute: #6f7982;
      --accent: var(--t);
    }
    body.mode-work { --accent: var(--t);    }
    body.mode-rest { --accent: var(--rest); }
    body.danger    { --accent: var(--red);  }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Rajdhani', 'PingFang SC', sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 30%),
        radial-gradient(120% 60% at 50% -10%, rgba(216,164,65,0.06), transparent 60%),
        var(--bg);
      display: flex; flex-direction: column; align-items: stretch;
      user-select: none; -webkit-user-select: none;
      -webkit-app-region: drag; position: relative;
      padding: 10px 14px 12px;
    }
    /* 细扫描线，战术屏质感 */
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,0.22) 2px 3px);
      opacity: 0.5;
    }
    /* HUD 角框 */
    body::after {
      content: ""; position: fixed; inset: 5px; z-index: 6; pointer-events: none;
      border: 1px solid rgba(120,140,150,0.14);
      background:
        linear-gradient(var(--accent),var(--accent)) left top / 14px 2px no-repeat,
        linear-gradient(var(--accent),var(--accent)) left top / 2px 14px no-repeat,
        linear-gradient(var(--accent),var(--accent)) right top / 14px 2px no-repeat,
        linear-gradient(var(--accent),var(--accent)) right top / 2px 14px no-repeat,
        linear-gradient(var(--accent),var(--accent)) left bottom / 14px 2px no-repeat,
        linear-gradient(var(--accent),var(--accent)) left bottom / 2px 14px no-repeat,
        linear-gradient(var(--accent),var(--accent)) right bottom / 14px 2px no-repeat,
        linear-gradient(var(--accent),var(--accent)) right bottom / 2px 14px no-repeat;
      transition: background 0.3s;
    }
    body > * { position: relative; z-index: 2; }

    /* ── 顶部状态条 ── (左侧留出 macOS 红黄绿按钮的位置，避免重叠) ── */
    .statusbar {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10.5px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--mute); padding: 2px 4px 8px 72px;
    }
    .statusbar .live { color: var(--red); font-weight: 700; }
    .statusbar .live .dot { animation: blink 1.3s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0.25; } }
    .statusbar .map { color: var(--accent); font-weight: 700; }

    /* ── 操作员卡片 ── */
    .operator {
      display: flex; align-items: center; gap: 14px;
      background: var(--panel); border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      padding: 11px 14px; transition: border-color 0.3s;
    }
    .portrait {
      width: 96px; height: 96px; flex: 0 0 96px; position: relative;
      border: 1.5px solid var(--accent); overflow: hidden;
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      clip-path: polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
      transition: border-color 0.3s;
    }
    .portrait img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 20%; }
    .portrait .badge { position: absolute; font-weight: 700; font-size: 22px; color: var(--accent); letter-spacing: 1px; }
    body.mode-rest .portrait .badge { font-size: 34px; letter-spacing: 1px; }
    .op-info { flex: 1; min-width: 0; }
    .op-side { font-size: 17px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent); text-transform: uppercase; }
    .op-rank { font-size: 12.5px; font-weight: 700; letter-spacing: 1px; margin-top: 3px; color: #b8c0c8; text-transform: uppercase; white-space: nowrap; }
    .op-status { font-size: 11px; letter-spacing: 2.5px; color: var(--mute); text-transform: uppercase; margin-top: 3px; }
    .op-score { text-align: right; }
    .op-score .num { font-size: 24px; font-weight: 700; color: var(--money); line-height: 1; font-variant-numeric: tabular-nums; }
    .op-score .cap { font-size: 8.5px; letter-spacing: 1.5px; color: var(--mute); text-transform: uppercase; }

    /* ── 主计时舞台 ── */
    .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 6px 0; }
    .site { font-size: 11px; letter-spacing: 4px; color: var(--mute); text-transform: uppercase; }
    .clock {
      font-size: 82px; font-weight: 700; line-height: 0.9; letter-spacing: 2px;
      font-variant-numeric: tabular-nums; color: #fff;
      text-shadow: 0 0 22px color-mix(in srgb, var(--accent) 55%, transparent);
      position: relative;
    }
    body.danger .clock { color: #ffdad2; animation: jitter 0.25s infinite; }
    @keyframes jitter { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-1.5px,1px)} 75%{transform:translate(1.5px,-1px)} }

    /* ── C4 引信装置 ── */
    .c4dev {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 12px; background: rgba(0,0,0,0.35); border: 1px solid var(--line);
      clip-path: polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px);
    }
    /* 真实 C4 雷包图（CS 1.6 风格，assets/c4.png） */
    .c4icon { width: 68px; height: auto; flex: 0 0 68px; display: block;
              filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
    body.running.mode-work .c4icon { animation: c4arm 0.8s steps(1) infinite; }  /* 布防时红光脉冲 */
    @keyframes c4arm { 50% { filter: drop-shadow(0 0 8px var(--red)) drop-shadow(0 2px 4px rgba(0,0,0,0.5)); } }
    body.mode-rest .c4icon { display: none; }        /* 休息无 C4 */
    .fuse { width: 200px; height: 8px; background: rgba(255,255,255,0.06); border: 1px solid var(--line); overflow: hidden; }
    .fuse-fill { height: 100%; width: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: width 1s linear, background 0.3s; }
    body.danger .fuse-fill { animation: fusePulse 0.5s steps(1) infinite; }
    @keyframes fusePulse { 50% { opacity: 0.45; } }

    .status { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); display: flex; align-items: center; gap: 7px; min-height: 16px; }
    .status .dot2 { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    body.running .status .dot2 { animation: blink 1s steps(1) infinite; }
    body:not(.running) .status .dot2 { background: var(--mute); box-shadow: none; }

    /* ── 模式 tab ── */
    .modes { display: flex; gap: 0; margin-top: 4px; -webkit-app-region: no-drag; }
    .mode-btn {
      flex: 1; padding: 9px 0; text-align: center;
      border: 1px solid var(--line); background: var(--panel);
      color: var(--mute); font-family: inherit; font-weight: 700; font-size: 13px;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.18s;
    }
    .mode-btn + .mode-btn { border-left: none; }
    .mode-btn:hover { color: var(--ink); }
    .mode-btn.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }

    /* ── 时长选择（专注 5/15/25/35/45，休息 5/10/15） ── */
    .pick { display: flex; align-items: center; gap: 0; margin-top: 7px; -webkit-app-region: no-drag; }
    body.mode-work #restPick { display: none; }
    body.mode-rest #workPick { display: none; }
    .pick-btn {
      flex: 1; padding: 7px 0; text-align: center;
      border: 1px solid var(--line); background: rgba(255,255,255,0.02);
      color: var(--mute); font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.16s;
    }
    .pick-btn + .pick-btn { border-left: none; }
    .pick-btn:hover { color: var(--ink); }
    .pick-btn.active { color: var(--bg); background: var(--accent); border-color: var(--accent); }
    .pick-unit { flex: 0 0 auto; padding-left: 9px; font-size: 9px; letter-spacing: 2px; color: var(--mute); }

    /* ── 控制 ── */
    .controls { display: flex; gap: 9px; margin-top: 11px; -webkit-app-region: no-drag; }
    .primary {
      flex: 1; padding: 14px 0;
      border: 1px solid var(--accent); background: var(--accent); color: var(--bg);
      font-family: inherit; font-weight: 700; font-size: 15px; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer;
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 40%, transparent);
      clip-path: polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);
      transition: filter 0.15s, transform 0.1s;
    }
    .primary:hover { filter: brightness(1.12); }
    .primary:active { transform: scale(0.97); }
    .icon-btn {
      width: 52px; border: 1px solid var(--line); background: var(--panel);
      color: var(--accent); font-size: 20px; cursor: pointer; transition: all 0.18s;
    }
    .icon-btn:hover { background: var(--accent); color: var(--bg); }

    /* ── 签名 ── */
    .sign { text-align: center; margin-top: 9px; font-size: 9.5px; letter-spacing: 2px; color: #e2ff32; font-weight: 700; text-transform: uppercase; text-shadow: 0 0 7px rgba(226,255,50,0.65); }

    /* ── 爆炸 & 胜利横幅 ── */
    body.boom .stage { animation: quake 0.8s cubic-bezier(.36,.07,.19,.97); }
    @keyframes quake {
      0%,100%{transform:translate(0,0)}
      8%{transform:translate(-17px,10px)}  20%{transform:translate(16px,-12px)}
      33%{transform:translate(-14px,-8px)} 46%{transform:translate(13px,10px)}
      60%{transform:translate(-9px,5px)}   74%{transform:translate(7px,-4px)}
      88%{transform:translate(-3px,2px)}
    }

    /* ── C4 起爆：白光 + 火球 + 冲击波 + 火星（CSGO 风） ── */
    .flash { position: fixed; inset: 0; z-index: 40; pointer-events: none;
             display: flex; align-items: center; justify-content: center; opacity: 0; }
    .flash.go { opacity: 1; }
    .flash > * { position: absolute; will-change: transform, opacity; }

    .flash .whiteout { inset: 0; background: #fff; opacity: 0; }
    .flash.go .whiteout { animation: exWhite 0.65s ease-out forwards; }
    @keyframes exWhite { 0%{opacity:0} 5%{opacity:1} 20%{opacity:0.2} 42%{opacity:0.55} 100%{opacity:0} }

    /* 升腾黑烟余韵，给爆炸压场分量 */
    .flash .smoke {
      width: 300px; height: 300px; border-radius: 50%; opacity: 0;
      transform: scale(0.3); filter: blur(16px);
      background: radial-gradient(circle, rgba(70,52,40,0.9) 0%, rgba(32,26,22,0.6) 46%, transparent 72%);
    }
    .flash.go .smoke { animation: exSmoke 1.4s ease-out forwards; }
    @keyframes exSmoke { 0%{opacity:0; transform:scale(0.3) translateY(0)} 22%{opacity:0.85}
                         100%{opacity:0; transform:scale(2.4) translateY(-46px)} }

    .flash .fireball {
      width: 320px; height: 320px; border-radius: 50%; filter: blur(2px);
      opacity: 0; transform: scale(0.2); mix-blend-mode: screen;
      background: radial-gradient(circle,
        #ffffff 0%, #fff2b0 8%, #ffd21a 18%, #ff9500 33%, #ff5a10 47%,
        #d4300f 60%, #6e1500 72%, transparent 80%);
    }
    .flash.go .fireball { animation: exFire 0.8s cubic-bezier(0.15,0.6,0.3,1) forwards; }
    @keyframes exFire {
      0%{opacity:0; transform:scale(0.15)} 8%{opacity:1; transform:scale(0.9)}
      40%{opacity:1; transform:scale(1.5)} 100%{opacity:0; transform:scale(2.5)}
    }
    /* 超亮内核（起爆瞬间的白热） */
    .flash .core {
      width: 200px; height: 200px; border-radius: 50%; opacity: 0; transform: scale(0.3);
      mix-blend-mode: screen;
      background: radial-gradient(circle, #fff 0%, #fff6d0 32%, #ffcf4a 56%, transparent 74%);
    }
    .flash.go .core { animation: exCore 0.5s ease-out forwards; }
    @keyframes exCore { 0%{opacity:0; transform:scale(0.3)} 12%{opacity:1; transform:scale(1)}
                        100%{opacity:0; transform:scale(1.9)} }

    .flash .shock {
      width: 60px; height: 60px; border-radius: 50%; opacity: 0; transform: scale(0.3);
      border: 7px solid rgba(255,222,150,0.9);
      box-shadow: 0 0 26px rgba(255,180,80,0.75), inset 0 0 26px rgba(255,180,80,0.5);
    }
    .flash.go .shock { animation: exShock 0.8s ease-out forwards; }
    .flash .shock2 { border-color: rgba(255,150,60,0.7); }
    .flash.go .shock2 { animation-delay: 0.14s; }
    @keyframes exShock { 0%{opacity:0.9; transform:scale(0.3); border-width:10px}
                         100%{opacity:0; transform:scale(5); border-width:1px} }

    .flash .sparks {
      width: 470px; height: 470px; opacity: 0;
      background:
        radial-gradient(3px 3px at 20% 30%, #ffd07a, transparent),
        radial-gradient(2px 2px at 80% 25%, #ffb020, transparent),
        radial-gradient(3px 3px at 65% 72%, #ff7a18, transparent),
        radial-gradient(2px 2px at 30% 78%, #ffe36b, transparent),
        radial-gradient(3px 3px at 50% 14%, #fff, transparent),
        radial-gradient(2px 2px at 14% 55%, #ff6a12, transparent),
        radial-gradient(3px 3px at 88% 62%, #ffd07a, transparent),
        radial-gradient(2px 2px at 72% 45%, #fff2c0, transparent);
    }
    .flash.go .sparks { animation: exSpark 0.85s ease-out forwards; }
    @keyframes exSpark { 0%{opacity:0; transform:scale(0.3)} 15%{opacity:1}
                         100%{opacity:0; transform:scale(3.4)} }
    .banner {
      position: fixed; inset: 0; z-index: 41; display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
    }
    .banner.go { animation: banner 2.6s ease-out forwards; }
    .banner .txt {
      font-weight: 700; font-size: 30px; letter-spacing: 3px; text-transform: uppercase; text-align: center;
      white-space: pre-line; line-height: 1.15;
      color: var(--banner-color, var(--t));
      text-shadow: 0 0 26px var(--banner-color, var(--t)), 0 3px 10px rgba(0,0,0,0.7);
      padding: 0 10px;
    }
    @keyframes banner { 0%{opacity:0; transform:scale(0.7)} 12%{opacity:1; transform:scale(1)} 80%{opacity:1} 100%{opacity:0} }
  </style>
</head>
<body class="mode-work">
  <div class="statusbar">
    <span class="live"><span class="dot">●</span> LIVE · REC</span>
    <span class="map">Map: De_Focus 2</span>
    <span id="clockText">--:--</span>
  </div>

  <div class="operator">
    <div class="portrait">
      <img id="avatarImg" alt="" />
      <span class="badge" id="avatarBadge">T</span>
    </div>
    <div class="op-info">
      <div class="op-side" id="opSide">TERRORISTS</div>
      <div class="op-rank" id="opRank">白银 I</div>
      <div class="op-status" id="label">专注 · 埋雷阶段</div>
    </div>
    <div class="op-score">
      <div class="num" id="scoreNum">0</div>
      <div class="cap">Rounds Won</div>
    </div>
  </div>

  <div class="stage">
    <div class="site" id="siteTag">BOMBSITE · A</div>
    <div class="clock" id="time">25:00</div>
    <div class="c4dev">
      <img class="c4icon" src="assets/c4.png" alt="C4" />
      <div class="fuse"><div class="fuse-fill" id="fuse"></div></div>
    </div>
    <div class="status" id="status"><span class="dot2"></span> <span id="statusText">STANDBY</span></div>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="work">专注 · T</button>
    <button class="mode-btn" data-mode="rest">休息 · CT</button>
  </div>

  <div class="pick" id="workPick">
    <button class="pick-btn" data-min="1">1</button>
    <button class="pick-btn" data-min="15">15</button>
    <button class="pick-btn" data-min="25">25</button>
    <button class="pick-btn" data-min="35">35</button>
    <button class="pick-btn" data-min="45">45</button>
    <span class="pick-unit">MIN</span>
  </div>

  <div class="pick" id="restPick">
    <button class="pick-btn" data-min="1">1</button>
    <button class="pick-btn" data-min="10">10</button>
    <button class="pick-btn" data-min="15">15</button>
    <span class="pick-unit">MIN</span>
  </div>

  <div class="controls">
    <button class="primary" id="startBtn">● 埋雷 PLANT</button>
    <button class="icon-btn" id="resetBtn" title="重置">↺</button>
  </div>

  <div class="sign">Kevin's 1st Vibe Coding App</div>

  <div class="flash" id="flash">
    <div class="whiteout"></div>
    <div class="smoke"></div>
    <div class="fireball"></div>
    <div class="core"></div>
    <div class="sparks"></div>
    <div class="shock"></div>
    <div class="shock shock2"></div>
  </div>
  <div class="banner" id="banner"><div class="txt" id="bannerTxt"></div></div>

  <script>
    /* ---------- 配置 ---------- */
    const FOCUS_OPTIONS = [1, 15, 25, 35, 45];   // 最短 1 分钟
    const REST_OPTIONS  = [1, 10, 15];

    let focusMin = Number(localStorage.getItem('focusMin')) || 25;
    if (!FOCUS_OPTIONS.includes(focusMin)) focusMin = 25;
    let restMin = Number(localStorage.getItem('restMin')) || 1;
    if (!REST_OPTIONS.includes(restMin)) restMin = 1;

    // 每个模式的全部展示数据（集中管理，去掉散落各处的 isWork 三元）
    const MODES = {
      work: { side: 'TERRORISTS',    label: '专注 · 埋雷阶段', title: '专注',
              site: 'BOMBSITE · A',   start: '● 埋雷 PLANT',   armed: 'C4 ARMED',
              badge: 'T',  avatar: 'avatars/t.png',  banner: 'TERRORISTS WIN', bannerColor: 'var(--t)' },
      rest: { side: '休息中',         label: '休息 · 放松一下', title: '休息',
              site: 'LOUNGE · 休息区', start: '▶ 开始休息 REST', armed: 'RESTING',
              badge: 'CT', avatar: 'avatars/ct.png', banner: '休息结束',       bannerColor: 'var(--rest)' },
    };

    // CS 段位阶梯：min = 达到该段位所需的「累计完成专注局数」，color 按段位大类走
    const SILVER = '#b8c0c8', GOLD = '#e0b23c', GUARD = '#4fb0a5', EAGLE = '#9b6cff', GLOBAL = '#38d0ff';
    const RANKS = [
      { min: 0,   name: '白银 I',        color: SILVER },
      { min: 2,   name: '白银 II',       color: SILVER },
      { min: 4,   name: '白银 III',      color: SILVER },
      { min: 7,   name: '白银 IV',       color: SILVER },
      { min: 10,  name: '白银大师',      color: SILVER },
      { min: 14,  name: '白银大师精英',  color: SILVER },
      { min: 18,  name: '黄金新星 I',    color: GOLD   },
      { min: 23,  name: '黄金新星 II',   color: GOLD   },
      { min: 28,  name: '黄金新星 III',  color: GOLD   },
      { min: 34,  name: '黄金新星大师',  color: GOLD   },
      { min: 40,  name: '守护者 I',      color: GUARD  },
      { min: 47,  name: '守护者 II',     color: GUARD  },
      { min: 55,  name: '守护者精英',    color: GUARD  },
      { min: 64,  name: '卓越守护者',    color: GUARD  },
      { min: 74,  name: '传奇之鹰',      color: EAGLE  },
      { min: 85,  name: '传奇之鹰大师',  color: EAGLE  },
      { min: 100, name: '至高职业大师',  color: GLOBAL },
      { min: 120, name: '全球精英',      color: GLOBAL },
    ];
    // 返回 { rank, next }：当前段位 + 下一段位（已封顶则 next 为 null）
    function rankInfo(wins) {
      const i = RANKS.findLastIndex((r) => wins >= r.min);   // RANKS[0].min=0，必有匹配
      return { rank: RANKS[i], next: RANKS[i + 1] || null };
    }

    const DANGER_SECS = 10;                          // 最后 10 秒进入起爆（红屏抖动）
    const C4_BEEP_SECS = 6;                          // 真实 C4 加速哔声时长(≈6s)，最后 6 秒一路响到爆炸
    const durOf = (m) => (m === 'work' ? focusMin : restMin) * 60;

    let mode = 'work';
    let remaining = durOf(mode);
    let timerId = null;
    let running = false;
    let completed = Number(localStorage.getItem('wins')) || 0;   // 累计完成的专注局数（生涯战绩，决定段位）

    const timeEl = document.getElementById('time');
    const labelEl = document.getElementById('label');
    const sideEl = document.getElementById('opSide');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const scoreEl = document.getElementById('scoreNum');
    const rankEl = document.getElementById('opRank');
    const statusText = document.getElementById('statusText');
    const fuseEl = document.getElementById('fuse');
    const siteEl = document.getElementById('siteTag');
    const wallEl = document.getElementById('clockText');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const workBtns = document.querySelectorAll('#workPick .pick-btn');
    const restBtns = document.querySelectorAll('#restPick .pick-btn');
    const avatarImg = document.getElementById('avatarImg');
    const avatarBadge = document.getElementById('avatarBadge');
    const flashEl = document.getElementById('flash');
    const bannerEl = document.getElementById('banner');
    const bannerTxtEl = document.getElementById('bannerTxt');
    avatarImg.onerror = () => { avatarImg.style.display = 'none'; avatarBadge.style.display = ''; };  // 图裂了才回退文字徽标

    const pad2 = (n) => String(n).padStart(2, '0');
    const fmt = (s) => `${pad2(Math.floor(s / 60))}:${pad2(s % 60)}`;
    const setActive = (nodes, pred) => nodes.forEach((n) => n.classList.toggle('active', pred(n)));
    const retrigger = (el) => { el.classList.remove('go'); void el.offsetWidth; el.classList.add('go'); };

    function render() {
      const t = fmt(remaining), m = MODES[mode];
      timeEl.textContent = t;
      labelEl.textContent = m.label;
      sideEl.textContent = m.side;
      scoreEl.textContent = completed;
      const { rank } = rankInfo(completed);
      rankEl.textContent = rank.name;
      rankEl.style.color = rank.color;
      document.title = `${t} · ${m.title}`;

      const isWork = mode === 'work';
      const danger = isWork && running && remaining <= DANGER_SECS && remaining > 0;
      document.body.classList.toggle('mode-work', isWork);
      document.body.classList.toggle('mode-rest', !isWork);
      document.body.classList.toggle('danger', danger);
      document.body.classList.toggle('running', running);
      setActive(modeBtns, (b) => b.dataset.mode === mode);

      startBtn.textContent = running ? '❚❚ 暂停 HOLD' : m.start;
      siteEl.textContent = m.site;
      statusText.textContent = danger ? 'DETONATING' : (running ? m.armed : 'STANDBY');

      fuseEl.style.width = (100 * remaining / durOf(mode)) + '%';
    }

    function tick() {
      remaining--;
      if (remaining <= 0) { finish(); return; }
      if (mode === 'work' && remaining === C4_BEEP_SECS) playClip('c4beep');  // 真实 C4 加速哔声，一次播到爆炸
      if (mode === 'rest' && remaining === 3) playClip('defusing');   // 休息将结束：拆弹中
      render();
    }
    function stopTimer() { running = false; clearInterval(timerId); timerId = null; stopClip('c4beep'); }
    function start() {
      if (running) return;
      running = true;
      timerId = setInterval(tick, 1000);
      if (mode === 'work') { blip(680, 0.06); playClip('planted'); }
      else { blip(760, 0.05); playClip('go'); }   // 开始休息：Go go go!
      render();
    }
    function pause() {
      const was = running;
      stopTimer();
      if (was) blip(300, 0.05, 'sine');
      render();
    }
    function toggle() { running ? pause() : start(); }
    function reset() { stopTimer(); remaining = durOf(mode); blip(420, 0.05); render(); }

    function switchMode(next) {
      mode = next; stopTimer(); remaining = durOf(mode);
      updateAvatar(); blip(560, 0.05); render();
    }

    // kind: 'work' | 'rest'
    function setDuration(kind, min, buttons) {
      if (kind === 'work') { focusMin = min; localStorage.setItem('focusMin', min); }
      else                 { restMin  = min; localStorage.setItem('restMin',  min); }
      if (mode === kind && !running) remaining = durOf(kind);
      setActive(buttons, (b) => Number(b.dataset.min) === min);
      blip(640, 0.04);
      render();
    }

    function updateAvatar() {
      avatarBadge.textContent = MODES[mode].badge;
      avatarImg.src = MODES[mode].avatar;   // 专注=T，休息=CT 特警（路径集中在 MODES）
      avatarImg.style.display = 'block';
      avatarBadge.style.display = 'none';   // 有真实头像图，就不显示文字徽标
    }

    function finish() {
      stopTimer();
      remaining = 0; render();
      let title, body, next, bannerText, bannerColor;
      if (mode === 'work') {
        completed++;
        localStorage.setItem('wins', completed);
        const info = rankInfo(completed);
        const rankedUp = info.rank.min === completed;   // 累计局数落在某段位阈值上 = 刚升段
        next = 'rest';
        title = rankedUp ? `⬆ 段位提升 · ${info.rank.name}` : '💣 起爆成功 · 专注完成';
        body = rankedUp
          ? `Terrorists Win! 晋级到「${info.rank.name}」🎖 休息 ${restMin} 分钟。`
          : (info.next
              ? `Terrorists Win! 距「${info.next.name}」还差 ${info.next.min - completed} 局。`
              : `Terrorists Win! 已封顶 · 全球精英 👑`);
        bannerText  = rankedUp ? '⬆ 段位提升\n' + info.rank.name : MODES.work.banner;
        bannerColor = rankedUp ? info.rank.color : MODES.work.bannerColor;
        boom();
        setTimeout(() => playClip('terrorists_win'), 900); // 爆炸声后再喊胜利
      } else {
        next = 'work';
        title = '☕ 休息结束';
        body = '回来啦 — 埋下下一颗 C4。';
        bannerText = MODES.rest.banner;
        bannerColor = MODES.rest.bannerColor;
        playClip('defused');                        // "The bomb has been defused."
        setTimeout(() => playClip('ct_win'), 1900); // 随后：Counter-Terrorists Win
      }
      winBanner(bannerText, bannerColor);
      if (window.pomodoro) window.pomodoro.notify(title, body);
      switchMode(next);
    }

    /* ---------- 声音引擎 ---------- */
    let actx = null;
    function ac() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx; }

    // 播放真实 CS 原声（sounds/NAME.mp3，缓存复用，避免每次重新解码 + 稳定时序）
    const CLIPS = {};
    function playClip(name, volume = 1) {
      try {
        const a = CLIPS[name] || (CLIPS[name] = new Audio('sounds/' + name + '.mp3'));
        a.volume = volume;
        a.currentTime = 0;
        const p = a.play();
        if (p && p.catch) p.catch(() => {});
      } catch (e) {}
    }

    function blip(freq, dur, type = 'square') {
      try {
        const c = ac(), t = c.currentTime;
        const o = c.createOscillator(), g = c.createGain();
        o.type = type; o.frequency.setValueAtTime(freq, t);
        o.frequency.exponentialRampToValueAtTime(freq * 0.6, t + dur);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.25, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g).connect(c.destination); o.start(t); o.stop(t + dur + 0.02);
      } catch (e) {}
    }
    // 停止某个已缓存音效（计时暂停/重置/切换时掐掉 C4 哔声）
    function stopClip(name) { const a = CLIPS[name]; if (a) { a.pause(); a.currentTime = 0; } }
    // 爆炸：真实 C4 爆炸声 + 白光火球 + 震屏
    function boom() {
      retrigger(flashEl);
      document.body.classList.add('boom');
      setTimeout(() => document.body.classList.remove('boom'), 820);
      playClip('explosion');
    }
    // 胜利横幅（颜色走 CSS 变量，样式由 .banner .txt 统一定义）
    function winBanner(text, color) {
      bannerTxtEl.textContent = text;
      bannerTxtEl.style.setProperty('--banner-color', color);
      retrigger(bannerEl);
    }
    // 顶部小时钟（真实时间）
    function tickWall() {
      const d = new Date();
      wallEl.textContent = `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
    }

    /* ---------- 事件绑定 ---------- */
    startBtn.addEventListener('click', toggle);
    resetBtn.addEventListener('click', reset);
    modeBtns.forEach((b) => b.addEventListener('click', () => switchMode(b.dataset.mode)));
    workBtns.forEach((b) => b.addEventListener('click', () => setDuration('work', Number(b.dataset.min), workBtns)));
    restBtns.forEach((b) => b.addEventListener('click', () => setDuration('rest', Number(b.dataset.min), restBtns)));
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') { e.preventDefault(); toggle(); }
    });

    setDuration('work', focusMin, workBtns);
    setDuration('rest', restMin, restBtns);
    updateAvatar();
    tickWall(); setInterval(tickWall, 1000);
  </script>
</body>
</html>
